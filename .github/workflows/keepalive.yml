name: Keep Supabase Awake

# Mantém o projeto Supabase (plano Free) acordado, evitando a pausa
# automática por inatividade (que ocorre após ~7 dias sem atividade).
on:
  schedule:
    # A cada 2 dias, às 12:00 UTC (09:00 no horário de Brasília)
    - cron: '0 12 */2 * *'
  workflow_dispatch:        # permite rodar manualmente pelo botão "Run workflow"

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase (RPC ping)
        run: |
          echo "Pingando o banco para manter o projeto ativo..."
          HTTP_CODE=$(curl -s -o /tmp/resp.txt -w "%{http_code}" \
            -X POST "https://ubheosijktvvnpgrsylm.supabase.co/rest/v1/rpc/ping" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "HTTP $HTTP_CODE"
          cat /tmp/resp.txt
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Ping falhou (HTTP $HTTP_CODE)"
            exit 1
          fi
          echo "Projeto mantido ativo com sucesso."
